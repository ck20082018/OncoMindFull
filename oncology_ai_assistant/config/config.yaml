# =============================================================================
# КОНФИГУРАЦИЯ AI-ПОМОЩНИКА ДЛЯ ПРОВЕРКИ ЛЕЧЕНИЯ ОНКОПАЦИЕНТОВ
# =============================================================================

# -----------------------------------------------------------------------------
# Общие настройки приложения
# -----------------------------------------------------------------------------
app:
  name: "Oncology AI Assistant"
  version: "1.0.0"
  debug: false
  log_level: "INFO"

# -----------------------------------------------------------------------------
# Настройки сервера
# -----------------------------------------------------------------------------
server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 300  # таймаут обработки запроса в секундах

# -----------------------------------------------------------------------------
# Настройки обработки файлов
# -----------------------------------------------------------------------------
files:
  # Максимальный размер загружаемого файла (в байтах)
  max_file_size: 52428800  # 50 MB
  
  # Разрешённые расширения
  allowed_extensions:
    - ".pdf"
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
    - ".bmp"
    - ".xls"
    - ".xlsx"
    - ".doc"
    - ".docx"
  
  # Временное хранение файлов
  temp_dir: "temp"
  cleanup_after_processing: true
  
# -----------------------------------------------------------------------------
# Настройки OCR
# -----------------------------------------------------------------------------
ocr:
  # Языки распознавания
  languages:
    - "ru"
    - "en"
  
  # Используемый GPU (если доступен)
  use_gpu: false
  
  # Порог уверенности распознавания
  confidence_threshold: 0.7
  
  # Настройки обработки PDF
  pdf:
    dpi: 300
    pages_per_batch: 5

# -----------------------------------------------------------------------------
# Настройки анонимизации
# -----------------------------------------------------------------------------
anonymization:
  # Включить строгий режим (блокировка при неудачной анонимизации)
  strict_mode: true
  
  # Заменять реальные значения на плейсхолдеры
  use_placeholders: true
  
  # Паттерны для обнаружения PII
  patterns:
    - "full_name"
    - "passport"
    - "policy"
    - "snils"
    - "birth_date"
    - "address"
    - "phone"

# -----------------------------------------------------------------------------
# Настройки LLM (YandexGPT)
# -----------------------------------------------------------------------------
llm:
  # Модель YandexGPT
  model_name: "yandexgpt-pro"
  
  # Параметры генерации
  temperature: 0.1  # низкая температура для точности
  max_tokens: 4000
  timeout: 60
  
  # Режим JSON ответа
  json_mode: true
  
  # Количество попыток при ошибке
  retry_attempts: 3
  retry_delay: 2  # секунды

# -----------------------------------------------------------------------------
# Настройки RAG поиска
# -----------------------------------------------------------------------------
rag:
  # Векторная модель для эмбеддингов
  embedding_model: "sentence-transformers/ruBert-large"
  
  # Параметры поиска
  top_k: 5  # количество релевантных документов
  similarity_threshold: 0.7
  
  # Размер чанков для разбиения документов
  chunk_size: 500
  chunk_overlap: 50
  
  # Индекс для поиска
  index_dir: "knowledge_base_data/index"

# -----------------------------------------------------------------------------
# База знаний клинических рекомендаций
# -----------------------------------------------------------------------------
knowledge_base:
  # Путь к локальным рекомендациям
  local_dir: "knowledge_base_data/minzdrav"
  
  # Источники для обновления
  sources:
    minzdrav:
      enabled: true
      base_url: "https://cr.minzdrav.gov.ru"
    nccn:
      enabled: false  # требуется подписка
      base_url: "https://www.nccn.org"
    esmo:
      enabled: false  # требуется подписка
      base_url: "https://www.esmo.org"
  
  # Автообновление рекомендаций
  auto_update:
    enabled: false
    interval_days: 30

# -----------------------------------------------------------------------------
# Настройки логирования
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {module} | {message}"
  
  # Файл логов
  file: "logs/app.log"
  rotation: "100 MB"
  retention: "30 days"
  
  # Не логировать чувствительные данные
  sanitize_logs: true

# -----------------------------------------------------------------------------
# Настройки безопасности
# -----------------------------------------------------------------------------
security:
  # Требовать анонимизацию перед отправкой в LLM
  require_anonymization: true
  
  # Максимальное количество запросов в минуту (rate limiting)
  rate_limit: 60
  
  # Срок жизни временных файлов
  temp_file_ttl: 3600  # 1 час

# -----------------------------------------------------------------------------
# Настройки интерфейсов
# -----------------------------------------------------------------------------
interfaces:
  # Интерфейс врача
  doctor:
    title: "AI-помощник врача-онколога"
    show_confidence: true
    show_references: true
    show_risks: true
    
  # Интерфейс пациента
  patient:
    title: "Ваш помощник по лечению"
    simplify_language: true
    max_reading_level: "8th_grade"
