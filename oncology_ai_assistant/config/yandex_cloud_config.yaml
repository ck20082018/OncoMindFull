# =============================================================================
# КОНФИГУРАЦИЯ YANDEX CLOUD
# =============================================================================
# ВНИМАНИЕ: Не коммитьте реальные учетные данные в репозиторий!
# Используйте переменные окружения или заполните этот файл локально.
# =============================================================================

# -----------------------------------------------------------------------------
# Аутентификация в Yandex Cloud
# -----------------------------------------------------------------------------
# Существует несколько способов аутентификации:
# 1. Service Account Key (рекомендуется для продакшена)
# 2. IAM-токен (для локальной разработки)
# 3. API-ключ (ограниченные возможности)

yandex_cloud:
  # ---------------------------------------------------------------------------
  # Способ 1: Аутентификация через сервисный аккаунт (рекомендуется)
  # ---------------------------------------------------------------------------
  # Создайте сервисный аккаунт с ролью ai.languageModels.user
  # Скачайте авторизованный ключ в формате JSON
  # Укажите путь к файлу ключа
  
  auth:
    type: "service_account_key"  # или "iam_token" или "api_key"
    
    # Путь к файлу ключа сервисного аккаунта
    service_account_key_path: ""  # например: "credentials/authorized_key.json"
    
    # IAM-токен (можно получить через yc iam create-token)
    iam_token: ""
    
    # API-ключ
    api_key: ""
    
  # ---------------------------------------------------------------------------
  # Идентификатор каталога (обязательно)
  # ---------------------------------------------------------------------------
  # Укажите ID каталога, в котором будет использоваться YandexGPT
  # Можно получить через: yc resource-manager folder list
  
  folder_id: ""
  
  # ---------------------------------------------------------------------------
  # Endpoint Yandex Cloud
  # ---------------------------------------------------------------------------
  endpoint:
    llm_api: "llm.api.cloud.yandex.net:443"
    
  # ---------------------------------------------------------------------------
  # Настройки модели YandexGPT
  # ---------------------------------------------------------------------------
  model:
    # Доступные модели:
    # - yandexgpt-lite      (базовая версия)
    # - yandexgpt-pro       (продвинутая версия)
    # - yandexgpt-lite-8k   (с увеличенным контекстом)
    
    name: "yandexgpt-pro"
    
    # Версия модели (оставьте пустым для последней)
    version: ""
    
    # Максимальное количество токенов в ответе
    max_tokens: 4000
    
    # Температура генерации (0.0 - 1.0)
    #越低 = более детерминированный ответ
    temperature: 0.1
    
    # Токены для остановки генерации
    stop_tokens: []
    
  # ---------------------------------------------------------------------------
  # Таймауты и повторные попытки
  # ---------------------------------------------------------------------------
  request:
    timeout: 60  # секунд
    max_retries: 3
    retry_delay: 2  # секунд между попытками
    
  # ---------------------------------------------------------------------------
  # Лимиты ( квоты Yandex Cloud)
  # ---------------------------------------------------------------------------
  # https://cloud.yandex.ru/docs/limits
  limits:
    # Максимум токенов в запросе
    max_input_tokens: 16000
    
    # Максимум токенов в ответе
    max_output_tokens: 4000
    
    # Лимит запросов в минуту (настраивается в Yandex Cloud)
    requests_per_minute: 60
