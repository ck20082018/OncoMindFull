services:
  # Backend API (Flask)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: oncomind-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - BASE_DIR=/app/backend
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_data:/app/backend/data
      - backend_uploads:/app/backend/uploads
    networks:
      - oncomind-network

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: oncomind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - oncomind-network

volumes:
  backend_data:
  backend_uploads:

networks:
  oncomind-network:
    driver: bridge
