version: '3.8'

services:
  # Backend API (Flask)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: oncomind-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - BASE_DIR=/app/backend
      - AI_PIPELINE_URL=http://ai:8000
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_data:/app/backend/data
      - backend_uploads:/app/backend/uploads
    depends_on:
      - ai
    networks:
      - oncomind-network

  # AI Pipeline (FastAPI)
  ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: oncomind-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - YC_FOLDER_ID=${YC_FOLDER_ID}
      - YC_API_KEY=${YC_API_KEY}
      - YC_SERVICE_ACCOUNT_KEY=/app/oncology_ai_assistant/credentials/authorized_key.json
      - AI_HOST=0.0.0.0
      - AI_PORT=8000
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KNOWLEDGE_BASE_DIR=/app/oncology_ai_assistant/knowledge_base_data
      - RAG_INDEX_DIR=/app/oncology_ai_assistant/index
    volumes:
      - ai_index:/app/oncology_ai_assistant/index
      - ai_logs:/app/oncology_ai_assistant/logs
      - ./oncology_ai_assistant/credentials:/app/oncology_ai_assistant/credentials:ro
      - ./oncology_ai_assistant/knowledge_base_data:/app/oncology_ai_assistant/knowledge_base_data:ro
    networks:
      - oncomind-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: oncomind-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - ai
    networks:
      - oncomind-network

volumes:
  backend_data:
  backend_uploads:
  ai_index:
  ai_logs:

networks:
  oncomind-network:
    driver: bridge
