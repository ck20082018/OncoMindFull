<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OncoMind — Мои пациенты</title>

    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css-all.min.css">
    <style>
        .patients-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .patients-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: white;
            padding: 10px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 24px;
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            background: var(--bg-light);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }

        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .patient-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 25px;
            box-shadow: var(--shadow-md);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .patient-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-light);
        }

        .patient-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .patient-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .patient-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        .patient-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .info-row i {
            color: var(--primary-blue);
            width: 20px;
        }

        .assign-btn, .unassign-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .assign-btn {
            background: var(--primary-blue);
            color: white;
        }

        .assign-btn:hover {
            background: var(--primary-deep);
        }

        .unassign-btn {
            background: #f1f5f9;
            color: #64748b;
        }

        .unassign-btn:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .my-patients-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-blue);
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: var(--radius-lg);
        }

        .empty-state i {
            font-size: 60px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- ШАПКА -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">OncoMind</div>
            <div class="burger-menu">
                <span class="burger-line"></span>
                <span class="burger-line"></span>
                <span class="burger-line"></span>
            </div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-link">Главная</a>
                <a href="../team.html" class="nav-link">О команде</a>
                <a href="../solutions.html" class="nav-link">Медицинские ИИ решения</a>
                <a href="dashboard.html" class="nav-link">Кабинет</a>
                <a href="profile.html" class="nav-link">Профиль</a>
                <a href="#" id="logoutBtn" class="btn btn-nav">Выйти</a>
            </nav>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <section>
        <div class="container patients-container">
            <div class="patients-header">
                <h1>Пациенты</h1>
            </div>

            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('all')">Все пациенты</button>
                <button class="tab-btn" onclick="showTab('my')">Мои пациенты</button>
            </div>

            <!-- Список пациентов -->
            <div class="patients-grid" id="patientsGrid">
                <!-- Загружается через JavaScript -->
            </div>
        </div>
    </section>

    <!-- ПОДВАЛ -->
    <footer class="footer">
        <div class="container footer-content">
            <div>© 2026 OncoMind. Все права защищены.</div>
            <div class="footer-links">
                <a href="../index.html">Главная</a>
                <a href="../team.html">О команде</a>
                <a href="../solutions.html">Решения</a>
            </div>
            <div class="footer-contact">
                <a href="mailto:team@oncomind.ai"><i class="fas fa-envelope"></i> team@oncomind.ai</a>
                <a href="#"><i class="fab fa-telegram"></i> Telegram</a>
            </div>
        </div>
    </footer>

    <script src="../config.js"></script>
    <script>
        let allPatients = [];
        let currentTab = 'all';
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', function() {
            currentUser = JSON.parse(localStorage.getItem('user'));
            if (!currentUser || currentUser.role !== 'doctor') {
                window.location.href = '../login.html';
                return;
            }

            loadPatients();
        });

        // Загрузка пациентов
        async function loadPatients() {
            try {
                console.log('Загрузка пациентов для врача:', currentUser.id);
                
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/doctor/patients?user_id=${currentUser.id}`);
                console.log('Ответ сервера:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Данные:', data);
                    allPatients = data.patients || [];
                    renderPatients();
                } else {
                    const error = await response.json();
                    console.error('Ошибка API:', error);
                    alert('Ошибка загрузки пациентов: ' + error.error);
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                alert('Ошибка подключения к серверу');
            }
        }

        // Переключение вкладки
        window.showTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(tab === 'my' ? 'мои' : 'все'));
            });
            renderPatients();
        };

        // Отрисовка пациентов
        function renderPatients() {
            const grid = document.getElementById('patientsGrid');
            
            let patients = allPatients;
            if (currentTab === 'my') {
                patients = allPatients.filter(p => p.is_my_patient);
            }

            if (patients.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <i class="fas fa-user-injured"></i>
                        <h3>Нет пациентов</h3>
                        <p>${currentTab === 'my' ? 'У вас ещё нет закреплённых пациентов' : 'Пациенты не найдены'}</p>
                    </div>
                `;
                return;
            }

            let html = '';
            patients.forEach(patient => {
                const initials = patient.full_name.split(' ').map(n => n[0]).join('').toUpperCase();
                
                html += `
                    <div class="patient-card">
                        ${patient.is_my_patient ? '<span class="my-patients-badge"><i class="fas fa-check-circle"></i> Мой пациент</span>' : ''}
                        <div class="patient-header">
                            <div class="patient-avatar">${initials}</div>
                            <div>
                                <h3 class="patient-name">${patient.full_name}</h3>
                                <div style="font-size: 13px; color: var(--text-muted);">${patient.email}</div>
                            </div>
                        </div>
                        <div class="patient-info">
                            ${patient.birth_date ? `
                                <div class="info-row">
                                    <i class="fas fa-calendar"></i>
                                    <span>Дата рождения: ${patient.birth_date}</span>
                                </div>
                            ` : ''}
                            ${patient.phone ? `
                                <div class="info-row">
                                    <i class="fas fa-phone"></i>
                                    <span>${patient.phone}</span>
                                </div>
                            ` : ''}
                        </div>
                        ${patient.is_my_patient 
                            ? `<button class="unassign-btn" onclick="unassignPatient('${patient.id}')">
                                <i class="fas fa-unlink"></i> Открепить пациента
                               </button>`
                            : `<button class="assign-btn" onclick="assignPatient('${patient.id}')">
                                <i class="fas fa-user-plus"></i> Закрепить пациента
                               </button>`
                        }
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // Закрепить пациента
        window.assignPatient = async function(patientId) {
            if (!confirm('Закрепить этого пациента за собой?')) return;

            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/doctor/patients/assign`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        doctor_id: currentUser.id,
                        patient_id: patientId
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Пациент успешно закреплён!');
                    loadPatients();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка закрепления пациента');
            }
        };

        // Открепить пациента
        window.unassignPatient = async function(patientId) {
            if (!confirm('Открепить этого пациента?')) return;

            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/doctor/patients/unassign`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ patient_id: patientId })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Пациент откреплён');
                    loadPatients();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка открепления пациента');
            }
        };

        // Выход
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>
