<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OncoMind — Мои пациенты</title>

    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css-all.min.css">
    <style>
        .patients-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .patients-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: white;
            padding: 10px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 24px;
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            background: var(--bg-light);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
        }

        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .patient-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 25px;
            box-shadow: var(--shadow-md);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .patient-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-light);
        }

        .patient-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .patient-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .patient-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        .patient-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .info-row i {
            color: var(--primary-blue);
            width: 20px;
        }

        .assign-btn, .unassign-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .assign-btn {
            background: var(--primary-blue);
            color: white;
        }

        .assign-btn:hover {
            background: var(--primary-deep);
        }

        .unassign-btn {
            background: #f1f5f9;
            color: #64748b;
        }

        .unassign-btn:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .my-patients-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-blue);
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: var(--radius-lg);
        }

        .empty-state i {
            font-size: 60px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- ШАПКА -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">OncoMind</div>
            <div class="burger-menu">
                <span class="burger-line"></span>
                <span class="burger-line"></span>
                <span class="burger-line"></span>
            </div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-link">Главная</a>
                <a href="../team.html" class="nav-link">О команде</a>
                <a href="../solutions.html" class="nav-link">Медицинские ИИ решения</a>
                <a href="dashboard.html" class="nav-link">Кабинет</a>
                <a href="profile.html" class="nav-link">Профиль</a>
                <a href="#" id="logoutBtn" class="btn btn-nav">Выйти</a>
            </nav>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <section>
        <div class="container patients-container">
            <div class="patients-header">
                <h1>Пациенты</h1>
            </div>

            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('all')">Все пациенты</button>
                <button class="tab-btn" onclick="showTab('my')">Мои пациенты</button>
            </div>

            <!-- Список пациентов -->
            <div class="patients-grid" id="patientsGrid">
                <!-- Загружается через JavaScript -->
            </div>
        </div>
    </section>

    <!-- ПОДВАЛ -->
    <footer class="footer">
        <div class="container footer-content">
            <div>© 2026 OncoMind. Все права защищены.</div>
            <div class="footer-links">
                <a href="../index.html">Главная</a>
                <a href="../team.html">О команде</a>
                <a href="../solutions.html">Решения</a>
            </div>
            <div class="footer-contact">
                <a href="mailto:team@oncomind.ai"><i class="fas fa-envelope"></i> team@oncomind.ai</a>
                <a href="#"><i class="fab fa-telegram"></i> Telegram</a>
            </div>
        </div>
    </footer>

    <!-- МОДАЛЬНОЕ ОКНО ПРОСМОТРА ПАЦИЕНТА -->
    <div class="modal" id="patientModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; overflow-y: auto;">
        <div class="modal-content" style="background: white; border-radius: var(--radius-lg); width: 90%; max-width: 1000px; margin: 40px auto; position: relative;">
            <button class="modal-close" onclick="closePatientModal()" style="position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-light); border: none; font-size: 20px; cursor: pointer;">✕</button>
            
            <div class="modal-header" style="padding: 30px; border-bottom: 1px solid #e2e8f0;">
                <h2 id="modalPatientName" style="margin: 0;"></h2>
                <div id="modalPatientInfo" style="margin-top: 10px; color: var(--text-secondary);"></div>
            </div>
            
            <div class="modal-body" style="padding: 30px;">
                <h3 style="margin-bottom: 20px; color: var(--primary-dark);">
                    <i class="fas fa-history"></i> История запросов
                </h3>
                <div id="patientHistory" style="line-height: 1.8;">
                    <!-- История загружается через JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script>
        let allPatients = [];
        let currentTab = 'all';
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', function() {
            currentUser = JSON.parse(localStorage.getItem('user'));
            if (!currentUser || currentUser.role !== 'doctor') {
                window.location.href = '../login.html';
                return;
            }

            loadPatients();
        });

        // Загрузка пациентов
        async function loadPatients() {
            try {
                console.log('Загрузка пациентов для врача:', currentUser.id);
                
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/doctor/patients?user_id=${currentUser.id}`);
                console.log('Ответ сервера:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Данные:', data);
                    allPatients = data.patients || [];
                    renderPatients();
                } else {
                    const error = await response.json();
                    console.error('Ошибка API:', error);
                    alert('Ошибка загрузки пациентов: ' + error.error);
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                alert('Ошибка подключения к серверу');
            }
        }

        // Переключение вкладки
        window.showTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(tab === 'my' ? 'мои' : 'все'));
            });
            renderPatients();
        };

        // Отрисовка пациентов
        function renderPatients() {
            const grid = document.getElementById('patientsGrid');
            
            let patients = allPatients;
            if (currentTab === 'my') {
                patients = allPatients.filter(p => p.is_my_patient);
            }

            if (patients.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <i class="fas fa-user-injured"></i>
                        <h3>Нет пациентов</h3>
                        <p>${currentTab === 'my' ? 'У вас ещё нет закреплённых пациентов' : 'Пациенты не найдены'}</p>
                    </div>
                `;
                return;
            }

            let html = '';
            patients.forEach(patient => {
                const initials = patient.full_name.split(' ').map(n => n[0]).join('').toUpperCase();
                
                html += `
                    <div class="patient-card" onclick="viewPatient('${patient.id}', '${patient.full_name}', '${patient.email || ''}', '${patient.phone || ''}', '${patient.birth_date || ''}')" style="cursor: pointer;">
                        ${patient.is_my_patient ? '<span class="my-patients-badge"><i class="fas fa-check-circle"></i> Мой пациент</span>' : ''}
                        <div class="patient-header">
                            <div class="patient-avatar">${initials}</div>
                            <div>
                                <h3 class="patient-name">${patient.full_name}</h3>
                                <div style="font-size: 13px; color: var(--text-muted);">${patient.email || ''}</div>
                            </div>
                        </div>
                        <div class="patient-info">
                            ${patient.birth_date ? `
                                <div class="info-row">
                                    <i class="fas fa-calendar"></i>
                                    <span>Дата рождения: ${patient.birth_date}</span>
                                </div>
                            ` : ''}
                            ${patient.phone ? `
                                <div class="info-row">
                                    <i class="fas fa-phone"></i>
                                    <span>${patient.phone}</span>
                                </div>
                            ` : ''}
                        </div>
                        ${patient.is_my_patient 
                            ? `<button class="unassign-btn" onclick="event.stopPropagation(); unassignPatient('${patient.id}')">
                                <i class="fas fa-unlink"></i> Открепить пациента
                               </button>`
                            : `<button class="assign-btn" onclick="event.stopPropagation(); assignPatient('${patient.id}')">
                                <i class="fas fa-user-plus"></i> Закрепить пациента
                               </button>`
                        }
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // Закрепить пациента
        window.assignPatient = async function(patientId) {
            if (!confirm('Закрепить этого пациента за собой?')) return;

            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/doctor/patients/assign`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        doctor_id: currentUser.id,
                        patient_id: patientId
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Пациент успешно закреплён!');
                    loadPatients();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка закрепления пациента');
            }
        };

        // Открепить пациента
        window.unassignPatient = async function(patientId) {
            if (!confirm('Открепить этого пациента?')) return;

            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/doctor/patients/unassign`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ patient_id: patientId })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Пациент откреплён');
                    loadPatients();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка открепления пациента');
            }
        };

        // Просмотр пациента
        window.viewPatient = function(patientId, fullName, email, phone, birthDate) {
            document.getElementById('modalPatientName').textContent = fullName;
            
            let info = '';
            if (email) info += `<div><i class="fas fa-envelope"></i> ${email}</div>`;
            if (phone) info += `<div><i class="fas fa-phone"></i> ${phone}</div>`;
            if (birthDate) info += `<div><i class="fas fa-calendar"></i> ${birthDate}</div>`;
            document.getElementById('modalPatientInfo').innerHTML = info;
            
            // Загружаем историю из localStorage
            loadPatientHistory(patientId, fullName);
            
            // Показываем модальное окно
            document.getElementById('patientModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        // Загрузка истории пациента
        function loadPatientHistory(patientId, fullName) {
            const historyDiv = document.getElementById('patientHistory');
            
            // Получаем все анализы из localStorage
            const allAnalyses = JSON.parse(localStorage.getItem('analyses') || '[]');
            
            // Фильтруем по этому пациенту (по имени файла или дате)
            // В реальном проекте нужно хранить patient_id в анализе
            const patientAnalyses = allAnalyses.filter(a => 
                a.file && a.file.toLowerCase().includes(fullName.split(' ')[0].toLowerCase())
            );
            
            if (patientAnalyses.length === 0) {
                historyDiv.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                        <i class="fas fa-folder-open" style="font-size: 48px; margin-bottom: 20px;"></i>
                        <p>История запросов пуста</p>
                        <p style="font-size: 14px;">Пациент ещё не проходил анализы</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            patientAnalyses.forEach((analysis, index) => {
                const date = new Date(analysis.date).toLocaleString('ru-RU');
                html += `
                    <div style="background: var(--bg-light); border-radius: var(--radius-md); padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--primary-blue);">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <strong style="color: var(--primary-dark);">
                                <i class="fas fa-file-medical"></i> ${analysis.modeName || 'Анализ'}
                            </strong>
                            <span style="font-size: 13px; color: var(--text-muted);">${date}</span>
                        </div>
                        <div style="color: var(--text-primary); line-height: 1.8; white-space: pre-wrap;">
                            ${analysis.result || analysis.preview}
                        </div>
                        ${analysis.file ? `
                            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; font-size: 13px; color: var(--text-secondary);">
                                <i class="fas fa-paperclip"></i> Файл: ${analysis.file}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            historyDiv.innerHTML = html;
        }

        // Закрыть модальное окно
        window.closePatientModal = function() {
            document.getElementById('patientModal').style.display = 'none';
            document.body.style.overflow = '';
        };

        // Закрытие по клику вне
        window.onclick = function(event) {
            const modal = document.getElementById('patientModal');
            if (event.target === modal) {
                closePatientModal();
            }
        };

        // Выход
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>
