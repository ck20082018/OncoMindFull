<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="medicalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0066b3;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00a1b0;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Фоновый круг с градиентом -->
    <circle cx="50" cy="50" r="45" fill="url(#medicalGradient)" filter="url(#glow)"/>
    
    <!-- Стилизованное изображение мозга/нейросети -->
    <path d="M30 35 Q40 25 50 25 Q60 25 70 35 Q75 45 70 55 Q60 65 50 65 Q40 65 30 55 Q25 45 30 35" 
          fill="white" opacity="0.95"/>
    
    <!-- Нейронные связи (точки) -->
    <circle cx="38" cy="40" r="3.5" fill="#0066b3"/>
    <circle cx="50" cy="35" r="3.5" fill="#0066b3"/>
    <circle cx="62" cy="40" r="3.5" fill="#0066b3"/>
    <circle cx="42" cy="50" r="3.5" fill="#0066b3"/>
    <circle cx="58" cy="50" r="3.5" fill="#0066b3"/>
    <circle cx="50" cy="58" r="3.5" fill="#0066b3"/>
    
    <!-- Стилизованный крест (медицинский символ) -->
    <path d="M50 30 L50 45 L35 45 L35 55 L50 55 L50 70 L60 70 L60 55 L75 55 L75 45 L60 45 L60 30 L50 30" 
          fill="white" opacity="0.3" transform="translate(-5, -5) scale(0.9)"/>
    
    <!-- Буква O в центре (OncoMind) -->
    <text x="50" y="68" text-anchor="middle" fill="white" font-size="26" font-weight="bold" font-family="Arial, sans-serif">O</text>
    
    <!-- Маленькие детали -->
    <circle cx="30" cy="30" r="2" fill="white" opacity="0.6"/>
    <circle cx="70" cy="30" r="2" fill="white" opacity="0.6"/>
    <circle cx="30" cy="70" r="2" fill="white" opacity="0.6"/>
    <circle cx="70" cy="70" r="2" fill="white" opacity="0.6"/>
</svg>